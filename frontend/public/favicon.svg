<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <style>
      @media (prefers-color-scheme: light) {
        .bg { fill: url(#grad); }
      }
      @media (prefers-color-scheme: dark) {
        .bg { fill: url(#grad-dark); }
      }
    </style>
  </defs>
  <!-- Background rounded square -->
  <rect class="bg" width="32" height="32" rx="8" fill="url(#grad)"/>
  <!-- Medical cross -->
  <path d="M16 6v20M6 16h20" stroke="#fff" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Inner dot for visual balance -->
  <circle cx="16" cy="16" r="2.5" fill="#fff" opacity="0.9"/>
</svg>
