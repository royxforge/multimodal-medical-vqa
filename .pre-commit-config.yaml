# =============================================================================
# MedVQA — Pre-Commit Hooks
# =============================================================================
# Install:
#   pip install pre-commit
#   pre-commit install
#
# Run on all files:
#   pre-commit run --all-files
#
# Skip a hook temporarily:
#   SKIP=ruff,mypy git commit -m "message"
# =============================================================================

repos:
  # ── ruff: fast Python linter (replaces flake8 + isort + pyflakes) ────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ── mypy: static type checking (manual only — too many third-party stubs) ─
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        args: [--no-strict-optional, --ignore-missing-imports, --show-error-codes]
        additional_dependencies: [types-PyYAML, types-requests]
        exclude: ^(notebooks/|scripts/|data/)
        stages: [manual]

  # ── pre-commit-hooks: general purpose checks ─────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^data/raw/|^experiments/
      - id: check-toml
      - id: check-json
      - id: mixed-line-ending
        args: [--fix=lf]
